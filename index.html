<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>📦 Stock Tracker</title>
  <meta name="description" content="Aplikasi stok barang sederhana - client side only">
  <meta name="theme-color" content="#0d6efd">
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="bg-light">

<!-- Header -->
<header class="bg-primary text-white py-3 shadow-sm">
  <div class="container d-flex justify-content-between align-items-center">
    <h4 class="mb-0">📦 Stock Tracker</h4>
    <div>
      <button id="btnBackup" class="btn btn-light btn-sm me-1">💾 Backup</button>
      <button id="btnRestore" class="btn btn-outline-light btn-sm">📤 Restore</button>
    </div>
  </div>
</header>

<!-- Hidden file input for restore -->
<input type="file" id="fileRestore" accept=".json" style="display:none">

<div class="container py-3">
  
  <!-- Summary Cards -->
  <div class="row g-2 mb-3" id="summaryCards">
    <!-- Dynamically rendered -->
  </div>

  <!-- Form Tambah Barang -->
  <div class="card mb-3">
    <div class="card-header d-flex justify-content-between align-items-center">
      <span>➕ Tambah Barang</span>
      <button id="btnClearAll" class="btn btn-outline-danger btn-sm">🗑️ Reset Semua</button>
    </div>
    <div class="card-body">
      <form id="formBarang" class="row g-2">
        <div class="col-6 col-md-3">
          <input type="text" id="kode" class="form-control form-control-sm" placeholder="Kode*" required maxlength="20">
        </div>
        <div class="col-6 col-md-4">
          <input type="text" id="nama" class="form-control form-control-sm" placeholder="Nama Barang*" required>
        </div>
        <div class="col-4 col-md-2">
          <input type="text" id="satuan" class="form-control form-control-sm" placeholder="Satuan" value="pcs">
        </div>
        <div class="col-4 col-md-2">
          <input type="number" id="stok" class="form-control form-control-sm" placeholder="Stok Awal" value="0" min="0">
        </div>
        <div class="col-4 col-md-1">
          <button type="submit" class="btn btn-primary btn-sm w-100">+</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Search & Filter -->
  <div class="mb-2">
    <input type="search" id="searchInput" class="form-control form-control-sm" placeholder="🔍 Cari barang...">
  </div>

  <!-- Tabel Data -->
  <div class="card mb-3">
    <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
      <span>📋 Daftar Barang (<span id="countBarang">0</span>)</span>
      <div class="d-flex gap-2">
        <button id="btnExport" class="btn btn-success btn-sm">📥 Export Excel</button>
        <button id="btnExportHistory" class="btn btn-info btn-sm text-white">📊 Export History</button>
      </div>
    </div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-striped table-hover mb-0">
          <thead class="table-light">
            <tr>
              <th>Kode</th>
              <th>Nama</th>
              <th class="d-none d-md-table-cell">Satuan</th>
              <th>Stok</th>
              <th class="d-none d-md-table-cell">±</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="tabelBarang">
            <tr><td colspan="6" class="text-center py-4 text-muted">Belum ada data barang</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Form Update Stok -->
  <div class="card">
    <div class="card-header">🔄 Update Stok</div>
    <div class="card-body">
      <form id="formStok" class="row g-2 align-items-end">
        <div class="col-md-4 col-6">
          <label class="form-label small mb-1">Barang</label>
          <select id="selectBarang" class="form-select form-select-sm" required>
            <option value="">-- Pilih --</option>
          </select>
        </div>
        <div class="col-md-2 col-3">
          <label class="form-label small mb-1">Jenis</label>
          <select id="jenisStok" class="form-select form-select-sm">
            <option value="masuk">➕ Masuk</option>
            <option value="keluar">➖ Keluar</option>
          </select>
        </div>
        <div class="col-md-2 col-3">
          <label class="form-label small mb-1">Jumlah</label>
          <input type="number" id="jumlahStok" class="form-control form-control-sm" min="1" required>
        </div>
        <div class="col-md-3 col-6">
          <label class="form-label small mb-1">Keterangan</label>
          <input type="text" id="keterangan" class="form-control form-control-sm" placeholder="Opsional">
        </div>
        <div class="col-md-1 col-2">
          <button type="submit" class="btn btn-warning btn-sm w-100">OK</button>
        </div>
      </form>
    </div>
  </div>

  <!-- History Section -->
  <div class="card mt-3">
    <div class="card-header d-flex justify-content-between">
      <span>📜 Riwayat Transaksi</span>
      <button id="btnClearHistory" class="btn btn-outline-secondary btn-sm">Hapus History</button>
    </div>
    <div class="card-body p-0">
      <div class="table-responsive" style="max-height: 200px; overflow-y: auto;">
        <table class="table table-sm mb-0">
          <thead class="table-light">
            <tr>
              <th>Tanggal</th><th>Barang</th><th>Jenis</th><th>Jml</th><th>Ket</th>
            </tr>
          </thead>
          <tbody id="tabelHistory">
            <tr><td colspan="5" class="text-center py-3 text-muted">Belum ada transaksi</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<!-- Footer -->
<footer class="text-center py-3 text-muted small">
  <div class="container">
    <p class="mb-1">💾 Data tersimpan di browser ini saja</p>
    <p class="mb-0">
      <a href="https://github.com" target="_blank" class="text-decoration-none">GitHub</a> 
      • v1.0 • Made with ❤️
    </p>
  </div>
</footer>

<!-- Toast Container -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="liveToast" class="toast" role="alert">
    <div class="toast-header">
      <strong class="me-auto" id="toastTitle">Notifikasi</strong>
      <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
    </div>
    <div class="toast-body" id="toastMessage"></div>
  </div>
</div>

<!-- Libraries -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

<!-- App Scripts -->
<script src="js/app.js"></script>
<script src="js/export.js"></script>

<!-- PWA Service Worker Registration -->
<script>
if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(err => console.log('SW failed:', err));
}
</script>

</body>
</html>
